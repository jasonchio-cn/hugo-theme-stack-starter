# ============================================================================
# 主题参数配置
# ============================================================================

# 主内容区域
mainSections = ["post"]
featuredImageField = "image"

# RSS 配置
rssFullContent = true

# Favicon（留空使用默认）
favicon = ""

# 页脚配置
[footer]
since = 2020
customText = "间歇性更新 持续性尝试更新"

# 日期格式
[dateFormat]
published = "2006-01-02"
lastUpdated = "2006-01-02 15:04:05"

# 侧边栏配置
[sidebar]
emoji = "🍥"
subtitle = "JasonChio"
avatar = "https://image.961110.xyz:10010/i/2025/03/avatar-自定义-1.webp"

# 文章配置
[article]
math = true
toc = true
readingTime = true
license.enabled = true
license.default = "Licensed under CC BY-NC-SA 4.0"

# 评论配置
[comments]
enabled = true
provider = "twikoo"

[comments.twikoo]
envId = "https://comment.961110.xyz:10010"
lang = "zh-CN"

# 小部件配置
[[widgets.homepage]]
type = "search"

[[widgets.homepage]]
type = "archives"
params = { limit = 5 }

[[widgets.homepage]]
type = "categories"
params = { limit = 10 }

[[widgets.homepage]]
type = "tag-cloud"
params = { limit = 10 }

[[widgets.page]]
type = "toc"

# OpenGraph 社交分享配置
[opengraph.twitter]
site = ""
card = "summary_large_image"

# 默认图片
[defaultImage.opengraph]
enabled = false
local = false
src = ""

# 颜色主题
[colorScheme]
toggle = true
default = "auto"

# 图片处理
[imageProcessing.cover]
enabled = true
[imageProcessing.content]
enabled = true