# ============================================================================
# 主题参数配置
# ============================================================================

# 主内容区域
mainSections = ["post"]
featuredImageField = "image"

# RSS 配置
rssFullContent = true

# Favicon（留空使用默认）
favicon = ""

# 排序
SortBy = "default"

# 页脚配置
[footer]
since = 2020
customText = "间歇性更新 持续性尝试更新"

# 日期格式
[dateFormat]
published = "2006-01-02"
lastUpdated = "2006-01-02 15:04:05"

# 侧边栏配置
[sidebar]
emoji = "🍥"
subtitle = "JasonChio"
avatar = "https://image.961110.xyz:10010/i/2025/03/avatar-自定义-1.webp"

# 文章配置
[article]
headingAnchor = false
math = true
readingTime = true
toc = true

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

# 小部件配置
[widgets]
homepage = [
    { type = "search" },
    { type = "archives", params = { limit = 5 } },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 10 } },
]
page = [{ type = "toc" }]

# 评论配置
[comments]
enabled = true
provider = "twikoo"

[comments.twikoo]
envId = "https://comment.961110.xyz:10010"
lang = "zh-CN"

# OpenGraph 社交分享配置
[opengraph.twitter]
site = ""
card = "summary_large_image"

# 默认图片
[defaultImage.opengraph]
enabled = false
local = false
src = ""

# 颜色主题
[colorScheme]
toggle = true
default = "auto"

# 图片处理
[imageProcessing.cover]
enabled = true

[imageProcessing.content]
enabled = true