name: Deploy to GitHub Pages Repository

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  repository_dispatch:
    types: [content-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: 1.97.1
      GO_VERSION: 1.25.5
      HUGO_VERSION: 0.154.2
      NODE_VERSION: 24.12.0
      TZ: Europe/Oslo
    steps:
      - name: Checkout config repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout content repository (ObsidianVault)
        uses: actions/checkout@v4
        with:
          repository: jasonchio-cn/ObsidianVault
          path: content-source
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge content from ObsidianVault
        run: |
          # 创建 content 目录结构
          mkdir -p content/post

          # 检查是否存在旧的 content 目录并备份
          if [ -d "content" ]; then
            echo "备份现有 content 目录 → content.bak"
            rm -rf content.bak
            mv content content.bak
          fi

          # 重新创建 content 目录结构
          mkdir -p content/post

          # 检查 content-source/content 目录
          if [ -d "content-source/content" ]; then
            echo "✓ 发现 content-source/content 目录"
            cp -r content-source/content/* content/ 2>/dev/null || true
          fi

          # 从 ObsidianVault 根目录同步 Markdown 文件到 content/post/（排除 README.md）
          echo "📝 从 ObsidianVault 根目录同步 Markdown 文件（排除 README.md）..."
          find content-source -maxdepth 1 -type f -name "*.md" ! -iname "README.md" -exec cp {} content/post/ \;

          # 统计同步的文件数量
          file_count=$(find content-source -maxdepth 1 -type f -name "*.md" ! -iname "README.md" | wc -l)
          echo "✓ 同步了 $file_count 个 Markdown 文件"

          # 同步资源目录（如果存在）
          if [ -d "content-source/assets" ]; then
            echo "📁 同步 assets 目录..."
            cp -r content-source/assets content/
          fi

          if [ -d "content-source/resources" ]; then
            echo "📁 同步 resources 目录..."
            cp -r content-source/resources content/
          fi

          echo "✓ 内容同步完成"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

<<<<<<< HEAD
      - name: Configure Git
        run: |
          git config core.quotepath false

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys:
            hugo-

      - name: Build the site
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository-name: jasonchio-cn/jasonchio-cn.github.io
          branch: main
          folder: public
          clean: true
          clean-exclude: |
            README.md
          single-commit: true

      - name: Install rsync
        if: github.event_name != 'pull_request'
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Remote Server (rsync)
        if: github.event_name != 'pull_request'
        run: |
          rsync -rz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            public/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET_DIR }}/
